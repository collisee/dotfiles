[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/base]
font-0 = "RecMonoCasual Nerd Font:style=Regular;2"
font-1 = "Noto Sans Mono CJK KR:style=Regular;2"
font-2 = "Noto Sans Mono CJK HK:style=Regular;2"
font-3 = "Noto Sans Mono CJK JP:style=Regular;2"
font-4 = "Noto Sans Mono CJK SC:style=Regular;2"
font-5 = "Noto Sans Mono CJK TC:style=Regular;2"
font-6 = "RecMonoCasual Nerd Font:style=Regular:pixelsize=20;3"

height = 24pt
radius = 15pt

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 2pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 0

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = bspwm

separator = " "
separator-foreground = ${colors.disabled}

modules-left = xworkspaces xwindow
modules-right = systray pulseaudio wlan eth date time

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 12pt
tray-size = 65%

[module/xworkspaces]
type = internal/xworkspaces

label-active-foreground = ${colors.primary}
label-occupied-foreground = ${colors.primary}   
label-urgent-foreground = ${colors.primary}
label-empty-foreground = ${colors.primary}

label-active = ůį™•
label-active-padding = 1

label-occupied = ůįļē
label-occupied-padding = 1

label-urgent = ůįóĖ
label-urgent-padding = 1

label-empty = ůįĄį
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "Óėł "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-disconnected-prefix = "ůįá® "
format-disconnected-prefix-foreground=${colors.primary}
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = connected
format-connected = <ramp-signal> <label-connected>

ramp-signal-0 = ůį§ü
ramp-signal-1 = ůį§Ę
ramp-signal-2 = ůį§•
ramp-signal-3 = ůį§®
ramp-signal-foreground=${colors.primary}

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} connected

[module/time]
type = internal/date
interval = 1

date = "%d %b"
time = "%H:%M"

label = %date% %time%
format-prefix = "ůįÉį "
format-prefix-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
