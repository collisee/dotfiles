[colors]
background = ${xrdb:color0:#222}
foreground = ${xrdb:color7:#222}
foreground-alt = ${xrdb:color7:#222}
primary = ${xrdb:color2:#222}
secondary = ${xrdb:color2:#222}
alert = ${xrdb:color3:#222}
disabled = ${xrdb:color8:#222}

[bar/base]
font-0 = "RecMonoCasual Nerd Font:style=Regular;2"
font-1 = "Noto Sans Mono CJK KR:style=Regular;2"
font-2 = "Noto Sans Mono CJK HK:style=Regular;2"
font-3 = "Noto Sans Mono CJK JP:style=Regular;2"
font-4 = "Noto Sans Mono CJK SC:style=Regular;2"
font-5 = "Noto Sans Mono CJK TC:style=Regular;2"

height = 24pt
radius = 0pt

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 0pt
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin = 0

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = bspwm

separator = " "

modules-left = time
modules-center = xworkspaces
modules-right = systray pulseaudio wlan eth battery

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 12pt
tray-size = 65%

[module/xworkspaces]
type = internal/xworkspaces

label-active-foreground = ${colors.primary}
label-occupied-foreground = ${colors.primary}   
label-urgent-foreground = ${colors.primary}
label-empty-foreground = ${colors.primary}

label-active = ůį™•
label-active-padding = 1

label-occupied = ůįļē
label-occupied-padding = 1

label-urgent = ůįóĖ
label-urgent-padding = 1

label-empty = ůįĄį
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>

label-volume = %percentage%%

label-muted = muted
format-muted = <label-muted>
format-muted-prefix = "ůįĖĀ "
format-muted-prefix-foreground = ${colors.primary}

ramp-volume-0 = ůįēŅ
ramp-volume-1 = ůįĖÄ
ramp-volume-2 = ůįēĺ
ramp-volume-foreground = ${colors.primary}


[module/battery]
type = internal/battery

battery = BAT0
adapter = AC0

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
animation-charging-framerate = 750

ramp-capacity-foreground=${colors.primary}
animation-charging-foreground=${colors.primary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-disconnected-prefix = "ůįá® "
format-disconnected-prefix-foreground=${colors.primary}
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %netspeed%
format-connected = <ramp-signal> <label-connected>

ramp-signal-0 = ůį§ü
ramp-signal-1 = ůį§Ę
ramp-signal-2 = ůį§•
ramp-signal-3 = ůį§®
ramp-signal-foreground=${colors.primary}

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %netspeed%

format-connected-prefix = ůįąÄ
format-connected-prefix-foreground=${colors.primary}
format-connected = <label-connected>


[module/time]
type = internal/date
interval = 1

date = "%d %b"
time = "%H:%M"

label = %date% %time%
format-prefix = "ůįÉį "
format-prefix-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
