{
  match = "window_type = 'tooltip'";
  fade = false;
  shadow = true;
  opacity = 0.75;
  full-shadow = false;
}, {
  match = "window_type = 'dock'    || "
          "window_type = 'desktop' || "
          "_GTK_FRAME_EXTENTS@";
  blur-background = false;
}, {
  match = "window_type = 'dock' || "
          "window_type = 'desktop' || "
	  "class_g = 'Dunst'";
  corner-radius = 0;
}, {
  match = "window_type = 'menu'    || "
          "window_type = 'dropdown_menu' || "
          "window_type = 'popup_menu' || "
          "window_type = 'tooltip' || "
	  "window_type = 'utility' || "
	  "window_type = 'combo' || "
	  "name = 'Notification'   || "
          "class_g = 'Conky'       || "
          "class_g ?= 'Notify-osd' || "
          "class_g = 'Cairo-clock' || "
          "window_type = 'dock'    || "
	  "_GTK_FRAME_EXTENTS@";
  blur-background = false;
  shadow = false;
},
{
    match = "class_g = 'flameshot' &&"
            "fullscreen = true";
    unredir = false;
    corner-radius = 0;
}

